
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cassette — Voice Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Permanent+Marker&family=Archivo+Black&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-vintage: #E8DCC4;
            --brand-red: #b91c1c;
            --brand-orange: #f38404;
        }
        body {
            font-family: 'Courier Prime', monospace;
            background-color: #121212; 
            color: #2a2a2a;
            margin: 0;
            user-select: none;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        
        /* Optimized Mockup Container */
        #root {
            width: min(100vw, 375px);
            height: min(100vh, 812px);
            background-color: var(--bg-vintage);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 10px #222, 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* Paper & Plastic Grain */
        .retro-surface {
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .retro-surface::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.12;
            pointer-events: none;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            z-index: 10;
        }

        /* Precision Logo Recreation */
        .logo-box {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0;
        }
        .logo-wordmark {
            font-family: 'Archivo Black', sans-serif;
            font-size: 42px;
            letter-spacing: -0.06em;
            line-height: 0.8;
            color: #000;
            text-transform: lowercase;
        }
        .logo-footer {
            display: flex;
            align-items: flex-start;
            width: 100%;
            margin-top: 4px;
        }
        .logo-line {
            height: 5px;
            background-color: #000;
            flex-grow: 1;
        }
        .logo-tag {
            background-color: #000;
            color: #fff;
            font-family: 'Archivo Black', sans-serif;
            font-size: 10px;
            padding: 3px 8px;
            text-transform: uppercase;
            line-height: 1;
            margin-left: 2px;
            letter-spacing: 0.02em;
        }

        /* 3D TACTILE BUTTON */
        .record-button-tactile {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at 35% 35%, #ff5252 0%, #b91c1c 60%, #7c0000 100%);
            border-radius: 50%;
            border: 6px solid #1a1a1a;
            position: relative;
            box-shadow: 
                0 12px 24px rgba(0,0,0,0.4),
                inset 0 4px 8px rgba(255,255,255,0.4),
                inset 0 -8px 16px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .record-button-tactile:active {
            transform: scale(0.94) translateY(4px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Speaker Grille */
        .speaker-concentric {
            width: 220px;
            height: 220px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hole {
            position: absolute;
            width: 5px;
            height: 5px;
            background-color: #111;
            border-radius: 50%;
            opacity: 0.85;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.5);
        }

        /* Cassette Spine */
        .tape-spine {
            width: 100%;
            height: 85px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            padding: 0 18px;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .tape-spine:active { transform: scale(0.97); }
        .tape-spine-label {
            background-color: #fffef2;
            padding: 8px 18px;
            min-width: 120px;
            text-align: center;
            font-family: 'Permanent Marker', cursive;
            font-size: 20px;
            color: #1a1a1a;
            border: 1px solid #ddd;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.05);
            transform: rotate(-0.5deg);
            z-index: 5;
        }

        /* Palette */
        .tape-cream { background-color: #f1ebd7; }
        .tape-silver { background-color: #b0b0b0; }
        .tape-rust { background-color: #cc6a2e; }
        .tape-blue-muted { background-color: #5c7287; }
        .tape-brown { background-color: #7d5e4a; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Dynamic Island */
        .dynamic-island {
            width: 100px;
            height: 30px;
            background-color: #000;
            border-radius: 15px;
            margin: 12px auto 0;
            z-index: 100;
        }
    </style>
<script type="importmap">
{
  "imports": {

    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }

</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
